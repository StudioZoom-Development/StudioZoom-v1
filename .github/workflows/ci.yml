name: Studio Zoom CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    name: Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: studio-zoom/package-lock.json

      - name: Install dependencies
        run: cd studio-zoom && npm ci

      - name: Lint code
        run: cd studio-zoom && npm run lint

      - name: Build Next.js app
        run: cd studio-zoom && npm run build
        env:
          # Include temporary mock vars for the CI build runner
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock-auth-domain"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock-project-id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock-storage"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "12345"
          NEXT_PUBLIC_FIREBASE_APP_ID: "mock-app-id"
          NEXT_PUBLIC_APP_ENV: "development"
